<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutriFit 智慧飲食管理</title>
  
  <!-- ==================== APP LOGO 圖示設定 (加入防快取版本號) ==================== -->
  <link rel="apple-touch-icon" href="logo.jpg?v=3">
  <link rel="icon" type="image/jpeg" sizes="192x192" href="logo.jpg?v=3">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23059669%22/><text y=%2270%22 x=%2215%22 font-size=%2260%22>🥗</text></svg>">
  <!-- ========================================================== -->

  <!-- 直接引入網路上的 React, Tailwind 與 Babel (讓瀏覽器能直接解析 JSX) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // === 圖標組件 (Inline SVGs 以確保相容性與響應式) ===
    const Icons = {
      Dashboard: () => (
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
        </svg>
      ),
      Food: () => (
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
        </svg>
      ),
      Chat: () => (
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      ),
      Recipe: () => (
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      ),
      Profile: () => (
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      ),
      Water: () => (
        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
        </svg>
      ),
      Plus: () => (
        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
        </svg>
      ),
      Trash: () => (
        <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      ),
      Sparkles: () => (
        <svg className="w-5 h-5 text-amber-500 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
        </svg>
      ),
      Camera: () => (
        <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      )
    };

    // === 安全的 LocalStorage 存取工具函數 (防止儲存爆滿造成白屏) ===
    const safeSetItem = (key, value) => {
      try {
        localStorage.setItem(key, value);
      } catch (e) {
        console.warn(`[LocalStorage 寫入失敗] 空間已滿，但系統已安全阻攔，防止白屏。`, e);
      }
    };

    function App() {
      // === 全域狀態控制 ===
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toastMessage, setToastMessage] = useState(null);
      
      // 飲食紀錄數據
      const [foodLogs, setFoodLogs] = useState(() => {
        try {
          const saved = localStorage.getItem('nutrifit_food_logs');
          return saved ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });

      // 自訂 AI 串接設定狀態
      const [aiProvider, setAiProvider] = useState(() => {
        return localStorage.getItem('nutrifit_ai_provider') || 'system';
      });
      const [customApiKey, setCustomApiKey] = useState(() => {
        return localStorage.getItem('nutrifit_custom_api_key') || '';
      });
      const [customModel, setCustomModel] = useState(() => {
        return localStorage.getItem('nutrifit_custom_model') || '';
      });

      // 使用者目標與基本資料
      const [userProfile, setUserProfile] = useState(() => {
        try {
          const saved = localStorage.getItem('nutrifit_user_profile');
          return saved ? JSON.parse(saved) : {
            name: '小明',
            gender: '男',
            age: '28',
            height: '175',
            weight: '76.5',
            targetWeight: '70.0',
            targetWeeks: '8',
            dailyWaterGoal: 2650, 
            dailyCalorieGoal: 1950, 
            baselineCalories: 2300, 
            plan: '8週極速體態改造計畫'
          };
        } catch (e) {
          return {
            name: '小明',
            gender: '男',
            age: '28',
            height: '175',
            weight: '76.5',
            targetWeight: '70.0',
            targetWeeks: '8',
            dailyWaterGoal: 2650,
            dailyCalorieGoal: 1950,
            baselineCalories: 2300,
            plan: '8週極速體態改造計畫'
          };
        }
      });

      // 水分攝取狀態
      const [waterIntake, setWaterIntake] = useState(() => {
        const saved = localStorage.getItem('nutrifit_water_intake');
        return saved ? parseInt(saved, 10) : 0;
      });
      const [beverageIntake, setBeverageIntake] = useState(() => {
        const saved = localStorage.getItem('nutrifit_beverage_intake');
        return saved ? parseInt(saved, 10) : 0;
      });

      // 體重歷史
      const [weightLogs, setWeightLogs] = useState(() => {
        try {
          const saved = localStorage.getItem('nutrifit_weight_logs');
          return saved ? JSON.parse(saved) : [];
        } catch(e) {
          return [];
        }
      });
      const [newWeight, setNewWeight] = useState('');

      // AI 營養師對話紀錄
      const [chatMessages, setChatMessages] = useState(() => {
        try {
          const saved = localStorage.getItem('nutrifit_chat_messages');
          return saved ? JSON.parse(saved) : [
            {
              id: 1,
              sender: 'dietitian',
              text: '哈囉！我是你的專屬營養師晴晴 🥦 很高興今天能陪你一起記錄飲食！隨時把你的飲食內容寫下來或拍照上傳，我會立刻幫你分析並標上綠、黃、紅三色燈號喔！我們今天一起加油吧！',
              time: '上午 09:00'
            }
          ];
        } catch(e) {
          return [
            {
              id: 1,
              sender: 'dietitian',
              text: '哈囉！我是你的專屬營養師晴晴 🥦 很高興今天能陪你一起記錄飲食！隨時把你的飲食內容寫下來或拍照上傳，我會立刻幫你分析並標上綠、黃、紅三色燈號喔！我們今天一起加油吧！',
              time: '上午 09:00'
            }
          ];
        }
      });

      const [chatInput, setChatInput] = useState('');
      const [isChatLoading, setIsChatLoading] = useState(false);

      // 食物分析與食譜生成狀態
      const [analyzingFood, setAnalyzingFood] = useState(false);
      const [foodInputText, setFoodInputText] = useState('');
      const [mealTypeSelect, setMealTypeSelect] = useState('早餐');
      const [uploadedBase64, setUploadedBase64] = useState(null);

      // 智慧食譜狀態
      const [recipeIngredients, setRecipeIngredients] = useState('');
      const [recipeResult, setRecipeResult] = useState(null);
      const [recipeImage, setRecipeImage] = useState(null);
      const [isRecipeLoading, setIsRecipeLoading] = useState(false);

      // --- 自動同步 LocalStorage ---
      useEffect(() => {
        // 【核心安全存檔防爆設計】：不把 base64 圖片強行塞入有限的 LocalStorage 
        // 這能保證網頁數據體積永遠在 10KB 內，絕不閃退！
        const optimizedLogs = foodLogs.map(log => ({
          ...log,
          image: null // 圖片只在當天即時畫面呈現，不塞入硬碟儲存空間
        }));
        safeSetItem('nutrifit_food_logs', JSON.stringify(optimizedLogs));
      }, [foodLogs]);

      useEffect(() => {
        safeSetItem('nutrifit_user_profile', JSON.stringify(userProfile));
      }, [userProfile]);

      useEffect(() => {
        safeSetItem('nutrifit_ai_provider', aiProvider);
      }, [aiProvider]);

      useEffect(() => {
        safeSetItem('nutrifit_custom_api_key', customApiKey);
      }, [customApiKey]);

      useEffect(() => {
        safeSetItem('nutrifit_custom_model', customModel);
      }, [customModel]);

      useEffect(() => {
        safeSetItem('nutrifit_water_intake', waterIntake.toString());
      }, [waterIntake]);

      useEffect(() => {
        safeSetItem('nutrifit_beverage_intake', beverageIntake.toString());
      }, [beverageIntake]);

      useEffect(() => {
        safeSetItem('nutrifit_weight_logs', JSON.stringify(weightLogs));
      }, [weightLogs]);

      useEffect(() => {
        safeSetItem('nutrifit_chat_messages', JSON.stringify(chatMessages));
      }, [chatMessages]);

      // 初始化體重紀錄
      useEffect(() => {
        const weightVal = parseFloat(userProfile.weight);
        if (!isNaN(weightVal) && weightVal > 0 && weightLogs.length === 0) {
          setWeightLogs([{ id: 1, date: '今日', weight: weightVal }]);
        }
      }, [userProfile.weight]);

      // 根據基本資料自動推算熱量與水分
      useEffect(() => {
        const weightVal = parseFloat(userProfile.weight);
        const heightVal = parseFloat(userProfile.height);
        const ageVal = parseInt(userProfile.age);
        const targetWeightVal = parseFloat(userProfile.targetWeight);
        const weeksVal = parseFloat(userProfile.targetWeeks);

        if (!isNaN(weightVal) && !isNaN(heightVal) && !isNaN(ageVal) && weightVal > 0 && heightVal > 0 && ageVal > 0) {
          let bmr = 0;
          if (userProfile.gender === '男') {
            bmr = 10 * weightVal + 6.25 * heightVal - 5 * ageVal + 5;
          } else {
            bmr = 10 * weightVal + 6.25 * heightVal - 5 * ageVal - 161;
          }
          
          const tdee = Math.round((bmr * 1.375) / 50) * 50;
          let dailyCalorieGoal = tdee;
          let computedWaterGoal = Math.round((weightVal * 35) / 50) * 50;

          if (!isNaN(targetWeightVal) && !isNaN(weeksVal) && weeksVal > 0) {
            const totalDays = weeksVal * 7;
            const weightDiff = weightVal - targetWeightVal;

            if (weightDiff > 0) {
              const totalDeficitNeeded = weightDiff * 7700;
              const dailyDeficit = totalDeficitNeeded / totalDays;
              const rawCalorieGoal = tdee - dailyDeficit;
              const safeCalorieGoal = Math.max(bmr, Math.max(1000, rawCalorieGoal));
              dailyCalorieGoal = Math.round(safeCalorieGoal / 50) * 50;

              const dailyWeightLossGrams = (weightDiff / totalDays) * 1000;
              const extraWater = dailyWeightLossGrams * 2;
              computedWaterGoal = Math.round(((weightVal * 35) + extraWater) / 50) * 50;
            }
          }

          setUserProfile(prev => ({
            ...prev,
            baselineCalories: tdee,
            dailyWaterGoal: computedWaterGoal,
            dailyCalorieGoal: dailyCalorieGoal
          }));
        }
      }, [userProfile.weight, userProfile.height, userProfile.age, userProfile.gender, userProfile.targetWeight, userProfile.targetWeeks]);

      const showToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 8000); 
      };

      const todayCalories = foodLogs.reduce((sum, item) => sum + item.calories, 0);
      const todayProtein = foodLogs.reduce((sum, item) => sum + item.protein, 0);
      const todayFat = foodLogs.reduce((sum, item) => sum + item.fat, 0);
      const todayCarbs = foodLogs.reduce((sum, item) => sum + item.carbs, 0);

      const totalItemsCount = foodLogs.reduce((sum, item) => {
        return sum + (item.greenLights?.length || 0) + (item.yellowLights?.length || 0) + (item.redLights?.length || 0);
      }, 0);
      const greenCount = foodLogs.reduce((sum, item) => sum + (item.greenLights?.length || 0), 0);
      const yellowCount = foodLogs.reduce((sum, item) => sum + (item.yellowLights?.length || 0), 0);
      const redCount = foodLogs.reduce((sum, item) => sum + (item.redLights?.length || 0), 0);

      const greenPercent = totalItemsCount > 0 ? Math.round((greenCount / totalItemsCount) * 100) : 50;
      const yellowPercent = totalItemsCount > 0 ? Math.round((yellowCount / totalItemsCount) * 100) : 30;
      const redPercent = totalItemsCount > 0 ? Math.round((redCount / totalItemsCount) * 100) : 20;

      const totalWaterIntake = waterIntake + beverageIntake;
      const waterPercent = Math.min(100, Math.round((totalWaterIntake / userProfile.dailyWaterGoal) * 100));
      const pureWaterRatio = totalWaterIntake === 0 ? 0 : Math.round((waterIntake / totalWaterIntake) * 100);
      const beverageRatio = totalWaterIntake === 0 ? 0 : Math.round((beverageIntake / totalWaterIntake) * 100);

      // === 核心 AI 串接路由分配器 ===
      const callAI = async (textPrompt, systemInstruction, imageBase64 = null, jsonFormat = false) => {
        if (aiProvider === 'system') {
          const apiKey = "";
          if (!apiKey) {
            throw new Error("偵測到系統預設金鑰未設定。由於您已將網站部署至 GitHub Pages，請前往右下角「個人檔案」➔ 切換為「自訂 Gemini API Key (Google)」並貼上您的專屬 API Key，即可成功開始使用 AI 分析與諮詢功能喔！");
          }

          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const parts = [{ text: textPrompt }];
          if (imageBase64) {
            const base64Data = imageBase64.split(',')[1] || imageBase64;
            parts.push({ inlineData: { mimeType: "image/png", data: base64Data } });
          }
          const payload = {
            contents: [{ role: "user", parts }],
            generationConfig: jsonFormat ? { responseMimeType: "application/json" } : undefined
          };
          if (systemInstruction) {
            payload.systemInstruction = { parts: [{ text: systemInstruction }] };
          }

          let delay = 1000;
          for (let i = 0; i < 5; i++) {
            try {
              const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${response.status}`);
              const resJson = await response.json();
              return resJson.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) {
              if (i === 4) throw error;
              await new Promise(resolve => setTimeout(resolve, delay));
              delay *= 2;
            }
          }
        } else if (aiProvider === 'custom-gemini') {
          if (!customApiKey) throw new Error("請先至「個人檔案」輸入您的 Gemini API Key！");
          
          const modelName = customModel.trim() || "gemini-1.5-flash";
          const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${customApiKey}`;
          
          const parts = [{ text: textPrompt }];
          if (imageBase64) {
            const base64Data = imageBase64.split(',')[1] || imageBase64;
            parts.push({ inlineData: { mimeType: "image/png", data: base64Data } });
          }
          const payload = {
            contents: [{ role: "user", parts }],
            generationConfig: jsonFormat ? { responseMimeType: "application/json" } : undefined
          };
          if (systemInstruction) {
            payload.systemInstruction = { parts: [{ text: systemInstruction }] };
          }

          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            let detail = `狀態碼 ${response.status}`;
            try {
              const errJson = await response.json();
              if (errJson?.error?.message) {
                detail = errJson.error.message;
              }
            } catch(e) {}
            
            if (detail.includes("API keys are not enabled") || detail.includes("has not been used in project")) {
              throw new Error(`Google API 未啟用！請前往網頁啟用：https://console.developers.google.com/apis/api/generativelanguage.googleapis.com/overview?project=${detail.split('project')[1]?.split(' ')[0]?.replace('=','') || '您的專案'}`);
            }
            throw new Error(`Google API 連線失敗: ${detail}`);
          }
          
          const resJson = await response.json();
          return resJson.candidates?.[0]?.content?.parts?.[0]?.text;
        } else if (aiProvider === 'custom-openai') {
          if (!customApiKey) throw new Error("請先至「個人檔案」輸入您的 OpenAI API Key！");
          const modelName = customModel.trim() || "gpt-4o-mini";
          const url = `https://api.openai.com/v1/chat/completions`;
          let userContent = textPrompt;
          if (imageBase64) {
            userContent = [
              { type: "text", text: textPrompt },
              { type: "image_url", image_url: { url: imageBase64 } }
            ];
          }
          const payload = {
            model: modelName,
            response_format: jsonFormat ? { type: "json_object" } : undefined,
            messages: [
              { role: "system", content: systemInstruction || "你是一位溫柔且專業的 Cofit 營養師晴晴。" },
              { role: "user", content: userContent }
            ]
          };
          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${customApiKey}`
            },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            let detail = `狀態碼 ${response.status}`;
            try {
              const errJson = await response.json();
              if (errJson?.error?.message) {
                detail = errJson.error.message;
              }
            } catch(e) {}
            throw new Error(`OpenAI API 錯誤: ${detail}`);
          }
          
          const resJson = await response.json();
          return resJson.choices?.[0]?.message?.content;
        }
      };

      const handleAnalyzeFood = async () => {
        if (!foodInputText.trim() && !uploadedBase64) {
          showToast('請輸入飲食內容描述或上傳照片喔！');
          return;
        }

        setAnalyzingFood(true);
        try {
          const textPrompt = `你是一位專業的 Cofit 營養師。請分析這頓飲食："${foodInputText || '使用這張餐點照片'}"。
請估算此頓飯的熱量（kcal）、蛋白質（g）、脂肪（g）、碳水化合物（g），並將食物組成部分分類至「綠燈食物」（原形、少油、健康食物）、「黃燈食物」（適度澱粉、中度調味）與「紅燈食物」（油炸、高糖、加工、高油）。
另外，請特別偵測此飲食中是否包含液體、飲料、湯水或白開水（例如：無糖豆漿、黑咖啡、可樂、白開水等）。如果有，請估計其 ml 數，並將類型歸類為 'water'（如果是純白開水）或 'beverage'（如果是飲料/湯/茶/咖啡/豆漿等非純水液體）。如果沒有液體，請填寫 0 與 'none'。

      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          // 安全閥：限制最大上傳單檔大小為 25MB，防止極端死機
          if (file.size > 25 * 1024 * 1024) {
            showToast("這張照片太巨大了，請換張照片或稍微裁剪一下喔！");
            return;
          }

          // 使用 URL.createObjectURL 優雅生成記憶體指標，不再使用FileReader大字串
          const objectUrl = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            // 解析度智慧壓縮：最大邊框鎖定為 800px (AI 辨識的最優精準尺寸)
            const MAX_WIDTH = 800;
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
              }
            } else {
              if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
              }
            }

            // 利用隱形畫布進行物理縮放與重繪
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 匯出為超輕量 50% 畫質 JPEG（原相片 10MB 會被完美瘦身為 40KB，AI 分析更快更準！）
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
            setUploadedBase64(compressedBase64);
            
            // 重要：釋放瀏覽器 ObjectURL 指針記憶體，避免洩漏

            showToast('相片已完成極速流暢瘦身！您可以點選「開始 AI 分析」了 🥦');
          };

          img.src = objectUrl;

                          <div>
                            <label className="text-xs text-slate-500 font-bold">自訂模型名稱 (可選)</label>
                            <input
                              type="text"
                              placeholder={aiProvider === 'custom-gemini' ? 'gemini-1.5-flash' : 'gpt-4o-mini'}
                              value={customModel}
                              onChange={(e) => setCustomModel(e.target.value)}
                              className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none mt-1"
                            />
                          </div>
                        </>
                      )}
                    </div>
                  </div>

                  <div className="bg-slate-50 rounded-2xl p-4 text-xs text-slate-500 space-y-2">
                    <p className="font-bold text-slate-700">💡 認識 Cofit 三色燈號</p>
                    <p>🟢 <b>綠燈食物（多吃）：</b> 原形食物、無糖飲品。幾乎不含精緻加工油鹽糖。</p>
                    <p>🟡 <b>黃燈食物（適量）：</b> 適當烹飪的澱粉、炒蛋。需適量控制分量。</p>
                    <p>🔴 <b>紅燈食物（少吃）：</b> 油炸類、高加工食品。減肥中應嚴控攝取！</p>
                  </div>
                </div>
              )}
            </main>

            {/* === 底部導覽列 === */}
            <nav className="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around py-2.5 px-1 z-40">
              <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center space-y-1 text-[10px] font-bold ${activeTab === 'dashboard' ? 'text-emerald-600' : 'text-slate-400'}`}><Icons.Dashboard /><span>儀表板</span></button>
              <button onClick={() => setActiveTab('food')} className={`flex flex-col items-center space-y-1 text-[10px] font-bold ${activeTab === 'food' ? 'text-emerald-600' : 'text-slate-400'}`}><Icons.Food /><span>飲食日記</span></button>
              <button onClick={() => setActiveTab('chat')} className={`flex flex-col items-center space-y-1 text-[10px] font-bold ${activeTab === 'chat' ? 'text-emerald-600' : 'text-slate-400'}`}><div className="relative"><Icons.Chat /><span className="absolute -top-1 -right-1 bg-rose-500 w-2 h-2 rounded-full"></span></div><span>AI諮詢</span></button>
              <button onClick={() => setActiveTab('recipe')} className={`flex flex-col items-center space-y-1 text-[10px] font-bold ${activeTab === 'recipe' ? 'text-emerald-600' : 'text-slate-400'}`}><Icons.Recipe /><span>智慧食譜</span></button>
              <button onClick={() => setActiveTab('profile')} className={`flex flex-col items-center space-y-1 text-[10px] font-bold ${activeTab === 'profile' ? 'text-emerald-600' : 'text-slate-400'}`}><Icons.Profile /><span>個人檔案</span></button>
            </nav>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
